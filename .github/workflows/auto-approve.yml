# =============================================================================
# Workflow : Auto Approve PR (Approved Users Only)
# Approuve automatiquement les PRs des utilisateurs de la whitelist,
# sous réserve qu'aucun commit bolt.new/StackBlitz ne soit détecté
# et que les checks CodeQL soient en succès.
#
# Auto-approves PRs from whitelisted users, provided no bolt.new/StackBlitz
# commit is detected and all CodeQL checks pass.
# =============================================================================

name: Auto Approve PR (Approved Users Only)

on:
  # Déclenché à chaque ouverture ou mise à jour d'une PR (même depuis un fork)
  # Triggered on PR open or new commits pushed (works even from forks)
  pull_request_target:
    types: [opened, synchronize]

  # Déclenché manuellement depuis l'onglet Actions (scanne toutes les PRs ouvertes)
  # Manually triggered from the Actions tab (scans all open PRs)
  workflow_dispatch: {}

jobs:
  auto-approve:
    runs-on: ubuntu-latest

    env:
      # Force l'exécution des actions JavaScript sous Node.js 24
      # Forces JavaScript actions to run under Node.js 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # PATs chargés en variables d'environnement pour le mode dispatch
      # PATs loaded as env vars for dispatch mode (cross-review)
      PAT_MINHO:  ${{ secrets.PAT_AUTO_APPROVE_MINHOZENS }}
      PAT_AETHER: ${{ secrets.PAT_AUTO_APPROVE_AETHERXYZ }}

      # Activer les logs VERBOSE via le secret AUTO_APPROVE_VERBOSE="true"
      # Enable VERBOSE logs via the secret AUTO_APPROVE_VERBOSE="true"
      VERBOSE: ${{ secrets.AUTO_APPROVE_VERBOSE }}

    permissions:
      pull-requests: write  # Nécessaire pour approuver / Required to approve PRs
      issues: write         # Nécessaire pour commenter / Required to post comments
      contents: read        # Nécessaire pour lire les checks / Required to read checks

    steps:

      # -----------------------------------------------------------------------
      #  ÉTAPE 1 — SÉLECTION DU PAT / SELECT CORRECT PAT (Insensible à la casse)
      #
      #  GitHub interdit à un utilisateur d'approuver sa propre PR.
      #  On utilise donc un PAT croisé : la PR d'AetherXYZ est approuvée
      #  via le PAT de MinhoZenS, et vice-versa.
      #
      #  GitHub prevents a user from approving their own PR.
      #  We use cross-review PATs: AetherXYZ's PR is approved using
      #  MinhoZenS's PAT, and vice-versa.
      # -----------------------------------------------------------------------
      - name: Sélection du PAT selon l'auteur / Select correct PAT based on PR author
        id: select-pat
        run: |
          AUTHOR=$(echo "${{ github.event.pull_request.user.login }}" | tr '[:upper:]' '[:lower:]')
          echo "Auteur détecté (minuscules) : '$AUTHOR'"

          if [ "$AUTHOR" = "aetherxyz" ]; then
            echo "Branche : AetherXYZ → PAT MINHOZENS"
            TOKEN="${{ secrets.PAT_AUTO_APPROVE_MINHOZENS }}"
          elif [ "$AUTHOR" = "minhozens" ]; then
            echo "Branche : MinhoZenS → PAT AETHERXYZ"
            TOKEN="${{ secrets.PAT_AUTO_APPROVE_AETHERXYZ }}"
          else
            echo "Auteur non reconnu, token vide"
            TOKEN=""
          fi

          if [ -z "$TOKEN" ]; then
            echo "⚠️ Le token est vide (secret manquant ou non défini ?)" >&2
          else
            echo "✅ Token récupéré (longueur : ${#TOKEN})"
          fi

          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      # -----------------------------------------------------------------------
      #  ÉTAPE 2 — MODE AUTOMATIQUE / AUTO MODE (pull_request_target event)
      #
      #  Déclenché à chaque PR ouverte ou mise à jour.
      #  Triggered on every PR opened or updated.
      # -----------------------------------------------------------------------
      - name: Approbation automatique d'une PR / Auto-approve single PR (event)
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.select-pat.outputs.token }}
          script: |

            // ----------------------------------------------------------------
            //  CONFIGURATION
            // ----------------------------------------------------------------

            // Utilisateurs autorisés à recevoir une approbation automatique
            // Users allowed to receive auto-approval
            const APPROVED_USERS = ['AetherXYZ', 'MinhoZenS'];

            const { owner, repo } = context.repo;
            const pr       = context.payload.pull_request;
            const prNumber = pr.number;
            const author   = pr.user.login;

            // ----------------------------------------------------------------
            //  SYSTÈME DE LOGS COLORÉS / COLORED LOGGING SYSTEM
            //  Utilise les codes ANSI pour colorer les logs dans Actions
            //  Uses ANSI color codes to colorize logs in Actions
            // ----------------------------------------------------------------
            const log = {
              info:    msg => core.info(`\x1b[36m[INFO]\x1b[0m ${msg}`),
              warn:    msg => core.warning(`\x1b[33m[WARN]\x1b[0m ${msg}`),
              error:   msg => core.error(`\x1b[31m[ERROR]\x1b[0m ${msg}`),
              check:   msg => core.info(`\x1b[35m[CHECK]\x1b[0m ${msg}`),
              approve: msg => core.info(`\x1b[32m[APPROVE]\x1b[0m ${msg}`),
              skip:    msg => core.info(`\x1b[33m[SKIP]\x1b[0m ${msg}`),
              // Logs détaillés activables via le secret VERBOSE="true"
              // Detailed logs activatable via the VERBOSE="true" secret
              verbose: msg => process.env.VERBOSE === "true"
                ? core.info(`\x1b[90m[VERBOSE]\x1b[0m ${msg}`)
                : null
            };

            log.info(`Traitement de la PR #${prNumber} par ${author} / Processing PR #${prNumber} by ${author}`);

            // ----------------------------------------------------------------
            //  FILTRE AUTEUR / AUTHOR FILTER
            //  Seuls les utilisateurs de la whitelist sont traités
            //  Only whitelisted users are processed
            // ----------------------------------------------------------------
            if (!APPROVED_USERS.includes(author)) {
              log.skip(`Auteur "${author}" non autorisé, PR ignorée. / Author "${author}" not in whitelist, skipping.`);
              return;
            }

            // ----------------------------------------------------------------
            //  VÉRIFICATION DU PAT / PAT AVAILABILITY CHECK
            //  Si aucun PAT n'a été sélectionné à l'étape précédente, on skip
            //  If no PAT was selected in the previous step, skip cleanly
            // ----------------------------------------------------------------
            if (!process.env.GITHUB_TOKEN) {
              log.warn(`Aucun PAT disponible pour cet auteur, skip. / No PAT available for this author. Skipping.`);
              return;
            }

            log.info(`PAT actif — reviewer : ${context.actor} / Active PAT — reviewer: ${context.actor}`);

            // ----------------------------------------------------------------
            //  UTILITAIRES / UTILITIES
            // ----------------------------------------------------------------

            function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

            // Retry avec backoff exponentiel — évite les échecs transitoires de l'API
            // Retry with exponential backoff — avoids transient API failures
            async function withRetry(fn, attempts = 3, delay = 1000) {
              for (let i = 0; i < attempts; i++) {
                try { return await fn(); }
                catch (e) {
                  if (i === attempts - 1) throw e;
                  log.warn(`Tentative ${i+1} échouée : ${e.message}. Retry dans ${delay}ms / Attempt ${i+1} failed: ${e.message}. Retrying in ${delay}ms`);
                  await sleep(delay);
                  delay *= 2;
                }
              }
            }

            // ----------------------------------------------------------------
            //  ANALYSE DES COMMITS / COMMIT SCAN
            //  Détecte les commits provenant de bolt.new ou StackBlitz
            //  Detects commits originating from bolt.new or StackBlitz
            //
            //  per_page: 100 — sans ça, l'API retourne 30 commits max par défaut.
            //  Un commit bolt.new au-delà du 30ème passerait inaperçu.
            //  per_page: 100 — without this, the API returns max 30 commits.
            //  A bolt.new commit beyond the 30th would go undetected.
            // ----------------------------------------------------------------
            log.check(`Récupération des commits... / Fetching commits...`);
            const commits = await withRetry(() =>
              github.rest.pulls.listCommits({ owner, repo, pull_number: prNumber, per_page: 100 })
            );

            log.info(`${commits.data.length} commit(s) trouvé(s). / Found ${commits.data.length} commit(s).`);
            log.verbose(JSON.stringify(commits.data.map(c => c.sha), null, 2));

            // Détection par nom ou email du committer (insensible à la casse)
            // Detection via committer name or email (case-insensitive)
            const isBolt = commits.data.some(c => {
              const name  = c.commit.committer?.name?.toLowerCase()  || "";
              const email = c.commit.committer?.email?.toLowerCase() || "";
              return name.includes("bolt") || email.includes("bolt") || email.includes("stackblitz");
            });

            if (isBolt) {
              log.warn(`Bolt.new / StackBlitz détecté — approbation bloquée. / Bolt.new / StackBlitz detected — approval blocked.`);
              const msg = '⚠️ **Auto-approval blocked** : commits bolt.new/StackBlitz détectés. Revue manuelle requise.\n⚠️ **Auto-approval blocked**: bolt.new/StackBlitz commits detected. Manual review required.';
              // Anti-doublon : ne poste le commentaire que s'il n'existe pas déjà
              // Dedup: only post comment if not already present
              const comments = await withRetry(() =>
                github.rest.issues.listComments({ owner, repo, issue_number: prNumber, per_page: 100 })
              );
              if (!comments.data.some(c => c.body && c.body.includes('Auto-approval blocked'))) {
                await withRetry(() =>
                  github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: msg })
                );
              }
              return;
            }

            // ----------------------------------------------------------------
            //  VÉRIFICATION CODEQL AVEC ATTENTE / CODEQL CHECK WITH POLLING
            //  Attend que tous les checks CodeQL soient terminés, puis vérifie
            //  qu'aucun n'a échoué.
            //  Waits for all CodeQL checks to complete, then verifies none failed.
            // ----------------------------------------------------------------
            log.check(`Attente de la fin des checks CodeQL... / Waiting for CodeQL runs to complete...`);

            const MAX_WAIT_MS = 10 * 60 * 1000;   // 10 minutes
            const POLL_INTERVAL_MS = 30 * 1000;   // 30 secondes
            const waitStart = Date.now();

            let codeqlRuns = [];  // sera rempli après l'attente

            while (true) {
              const checks = await withRetry(() =>
                github.rest.checks.listForRef({ owner, repo, ref: pr.head.sha, per_page: 100 })
              );

              codeqlRuns = (checks.data.check_runs || []).filter(r =>
                r.name.toLowerCase().includes("codeql")
              );

              const pending = codeqlRuns.filter(r => r.status !== "completed");

              if (pending.length === 0) break;   // tous terminés

              if (Date.now() - waitStart > MAX_WAIT_MS) {
                log.warn(`Timeout atteint en attendant CodeQL. Le workflow va s'arrêter sans approuver. / Timeout waiting for CodeQL. Stopping without approving.`);
                return;
              }

              log.info(`En attente de ${pending.length} check(s) CodeQL... / Waiting for ${pending.length} CodeQL check(s)...`);
              await sleep(POLL_INTERVAL_MS);
            }

            log.info(`${codeqlRuns.length} check(s) CodeQL terminé(s). / Detected ${codeqlRuns.length} completed CodeQL check(s).`);
            log.verbose(JSON.stringify(codeqlRuns.map(c => ({ name: c.name, status: c.status, conclusion: c.conclusion })), null, 2));

            // Vérification qu'aucun check n'est en échec
            const failingCodeql = codeqlRuns.filter(r =>
              !["success", "neutral", "skipped"].includes(r.conclusion)
            );

            if (failingCodeql.length) {
              const names = failingCodeql.map(r => r.name).join(', ');
              log.warn(`CodeQL échoué : ${names} / CodeQL failing: ${names}`);
              const msg = `⚠️ Approbation automatique ignorée : les checks CodeQL ont échoué : ${names}.\n⚠️ Auto-approval skipped: CodeQL checks failed: ${names}.`;
              // Anti-doublon commentaire / Dedup comment
              const comments = await withRetry(() =>
                github.rest.issues.listComments({ owner, repo, issue_number: prNumber, per_page: 100 })
              );
              if (!comments.data.some(c => c.body && c.body.includes('CodeQL checks failed'))) {
                await withRetry(() =>
                  github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: msg })
                );
              }
              return;
            }

            // ----------------------------------------------------------------
            // Idempotence
            //  Vérifie si la PR est déjà approuvée par ce reviewer
            //  afin d'éviter des approbations en double.
            //  Checks if the PR is already approved by this reviewer
            //  to avoid duplicate approvals.
            // ----------------------------------------------------------------
            log.check(`Vérification des reviews existantes... / Checking existing reviews...`);
            const reviews = await withRetry(() =>
              github.rest.pulls.listReviews({ owner, repo, pull_number: prNumber, per_page: 100 })
            );

            const alreadyApproved = reviews.data.some(r =>
              r.user?.login === context.actor && r.state === "APPROVED"
            );

            if (alreadyApproved) {
              log.skip(`Déjà approuvée par ${context.actor}. / Already approved by ${context.actor}.`);
              return;
            }

            // ----------------------------------------------------------------
            //  APPROBATION / APPROVAL
            // ----------------------------------------------------------------
            log.approve(`Approbation de la PR #${prNumber}... / Approving PR #${prNumber}...`);
            await withRetry(() =>
              github.rest.pulls.createReview({
                owner, repo,
                pull_number: prNumber,
                event: "APPROVE",
                body: "✅ Auto-approuvé par le workflow. / Auto-approved by workflow."
              })
            );

            log.approve(`PR #${prNumber} approuvée avec succès. / PR #${prNumber} approved successfully.`);

            // ----------------------------------------------------------------
            //  RÉSUMÉ / SUMMARY
            // ----------------------------------------------------------------
            core.info([
              '',
              '\x1b[32m==================== RÉSUMÉ / SUMMARY ====================\x1b[0m',
              `PR :                 #${prNumber}`,
              `Auteur / Author :    ${author}`,
              `Reviewer :           ${context.actor}`,
              'CodeQL :             \u2705 OK',
              'Bolt/StackBlitz :    \u2705 Non détecté / Not detected',
              'Statut / Status :    \u2705 APPROVED',
              '\x1b[32m==========================================================\x1b[0m',
              ''
            ].join('\n'));

      # -----------------------------------------------------------------------
      #  ÉTAPE 3 — Mode Manuel / Manual Mode (workflow_dispatch)
      #
      #  Scanne TOUTES les PRs ouvertes (y compris les anciennes) et les
      #  approuve si elles passent tous les filtres.
      #  Pour le cross-review, on instancie un client Octokit dédié avec
      #  le bon PAT pour chaque PR — contrairement à github.auth = token
      #  qui ne fonctionne pas dans github-script.
      #
      #  Scans ALL open PRs (including older ones) and approves them if
      #  they pass all filters.
      #  For cross-review, a dedicated Octokit client is instantiated with
      #  the correct PAT per PR — unlike github.auth = token which does
      #  not work inside github-script.
      # -----------------------------------------------------------------------
      - name: Approbation manuelle de toutes les PRs ouvertes / Auto-approve all open PRs (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          # Token de base pour lister les PRs (lecture seule)
          # Base token to list PRs (read-only)
          github-token: ${{ secrets.PAT_AUTO_APPROVE_MINHOZENS }}
          script: |

            // ----------------------------------------------------------------
            //  CONFIGURATION
            // ----------------------------------------------------------------

            // Utilisateurs autorisés / Authorized users
            const APPROVED_USERS = ['AetherXYZ', 'MinhoZenS'];

            const { owner, repo } = context.repo;

            // ----------------------------------------------------------------
            //  SYSTÈME DE LOGS COLORÉS / COLORED LOGGING SYSTEM
            // ----------------------------------------------------------------
            const log = {
              info:    msg => core.info(`\x1b[36m[INFO]\x1b[0m ${msg}`),
              warn:    msg => core.warning(`\x1b[33m[WARN]\x1b[0m ${msg}`),
              error:   msg => core.error(`\x1b[31m[ERROR]\x1b[0m ${msg}`),
              check:   msg => core.info(`\x1b[35m[CHECK]\x1b[0m ${msg}`),
              approve: msg => core.info(`\x1b[32m[APPROVE]\x1b[0m ${msg}`),
              skip:    msg => core.info(`\x1b[33m[SKIP]\x1b[0m ${msg}`),
              verbose: msg => process.env.VERBOSE === "true"
                ? core.info(`\x1b[90m[VERBOSE]\x1b[0m ${msg}`)
                : null
            };

            // ----------------------------------------------------------------
            //  UTILITAIRES / UTILITIES
            // ----------------------------------------------------------------

            function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

            // Retry avec backoff exponentiel / Retry with exponential backoff
            async function withRetry(fn, attempts = 3, delay = 1000) {
              for (let i = 0; i < attempts; i++) {
                try { return await fn(); }
                catch (e) {
                  if (i === attempts - 1) throw e;
                  log.warn(`Tentative ${i+1} échouée : ${e.message}. Retry dans ${delay}ms / Attempt ${i+1} failed: ${e.message}. Retrying in ${delay}ms`);
                  await sleep(delay);
                  delay *= 2;
                }
              }
            }

            log.info(`Mode manuel : scan de toutes les PRs ouvertes... / Manual mode: scanning all open PRs...`);

            // ----------------------------------------------------------------
            //  RÉCUPÉRATION DE TOUTES LES PRs OUVERTES / FETCH ALL OPEN PRs
            //  github.paginate parcourt automatiquement toutes les pages,
            //  ce qui inclut les PRs anciennes.
            //  github.paginate automatically walks through all pages,
            //  which includes older PRs.
            // ----------------------------------------------------------------
            const prs = await withRetry(() =>
              github.paginate(github.rest.pulls.list, { owner, repo, state: 'open', per_page: 100 })
            );

            log.info(`${prs.length} PR(s) ouverte(s) trouvée(s). / Found ${prs.length} open PR(s).`);

            // Tableau récapitulatif rempli au fil du traitement
            // Summary table filled as PRs are processed
            const summary = [];

            for (const pr of prs) {
              const prNumber = pr.number;
              const author   = pr.user.login;

              log.info(`\n--- PR #${prNumber} par/by ${author} ---`);

              // --------------------------------------------------------------
              //  FILTRE WHITELIST / WHITELIST FILTER
              // --------------------------------------------------------------
              if (!APPROVED_USERS.includes(author)) {
                log.skip(`Auteur "${author}" non autorisé. / Author "${author}" not whitelisted.`);
                summary.push({ pr: prNumber, author, status: "SKIPPED (not whitelisted)" });
                continue;
              }

              // --------------------------------------------------------------
              //  SÉLECTION DU PAT CROSS-REVIEW / CROSS-REVIEW PAT SELECTION
              //
              //  On ne peut pas utiliser github.auth = token dans github-script
              //  (le client est initialisé une seule fois à l'entrée du script).
              //  On instancie donc un client Octokit dédié avec le bon PAT.
              //
              //  github.auth = token does not work inside github-script
              //  (the client is initialized once at script entry).
              //  We therefore instantiate a dedicated Octokit client with
              //  the correct PAT for each PR.
              // Sélection du PAT correct pour chaque auteur de Pull Request (Insensible à la casse)
              const authorLower = author.toLowerCase();
              // --------------------------------------------------------------

              // AetherXYZ → approuvé par PAT Minho / approved by Minho's PAT
              // MinhoZenS → approuvé par PAT Aether / approved by Aether's PAT
              const token = authorLower === "aetherxyz"
                ? process.env.PAT_MINHO
                : process.env.PAT_AETHER;

              if (!token) {
                log.warn(`Aucun PAT disponible pour PR #${prNumber}. / No PAT available for PR #${prNumber}, skipping.`);
                summary.push({ pr: prNumber, author, status: "SKIPPED (no PAT)" });
                continue;
              }

              // ----------------------------------------------------------------
              //  CLIENT FETCH LÉGER AVEC LE BON PAT / LIGHTWEIGHT FETCH CLIENT
              //
              //  require('@actions/github') n'est pas accessible dans github-script.
              //  On utilise fetch (toujours disponible) pour appeler l'API GitHub
              //  directement avec le token cross-review approprié.
              //
              //  require('@actions/github') is not accessible inside github-script.
              //  We use fetch (always available) to call the GitHub API directly
              //  with the appropriate cross-review token.
              // ----------------------------------------------------------------
              async function ghFetch(method, path, body = null) {
                const opts = {
                  method,
                  headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28',
                    'Content-Type': 'application/json'
                  }
                };
                if (body) opts.body = JSON.stringify(body);
                const res = await fetch(`https://api.github.com${path}`, opts);
                if (!res.ok) throw new Error(`GitHub API ${res.status} on ${method} ${path}: ${await res.text()}`);
                return res.json();
              }

              try {

                // ------------------------------------------------------------
                //  ANALYSE DES COMMITS / COMMIT SCAN
                //  per_page: 100 pour couvrir les grosses PRs sans pagination
                //  per_page: 100 to cover large PRs without additional paging
                // ------------------------------------------------------------
                log.check(`Récupération des commits... / Fetching commits...`);
                const commitsData = await withRetry(() =>
                  ghFetch('GET', `/repos/${owner}/${repo}/pulls/${prNumber}/commits?per_page=100`)
                );

                log.info(`${commitsData.length} commit(s).`);
                log.verbose(JSON.stringify(commitsData.map(c => c.sha), null, 2));

                // Détection bolt.new / StackBlitz (insensible à la casse)
                // Bolt.new / StackBlitz detection (case-insensitive)
                const isBolt = commitsData.some(c => {
                  const name  = c.commit.committer?.name?.toLowerCase()  || "";
                  const email = c.commit.committer?.email?.toLowerCase() || "";
                  return name.includes("bolt") || email.includes("bolt") || email.includes("stackblitz");
                });

                if (isBolt) {
                  log.warn(`Bolt.new / StackBlitz détecté. / Bolt.new / StackBlitz detected.`);
                  // Anti-doublon : vérifie avant de poster le commentaire
                  // Dedup: check before posting the comment
                  const existingComments = await withRetry(() =>
                    ghFetch('GET', `/repos/${owner}/${repo}/issues/${prNumber}/comments?per_page=100`)
                  );
                  if (!existingComments.some(c => c.body && c.body.includes('Auto-approval blocked'))) {
                    const msg = '⚠️ **Auto-approval blocked** : commits bolt.new/StackBlitz détectés. Revue manuelle requise.\n⚠️ **Auto-approval blocked**: bolt.new/StackBlitz commits detected. Manual review required.';
                    await withRetry(() =>
                      ghFetch('POST', `/repos/${owner}/${repo}/issues/${prNumber}/comments`, { body: msg })
                    );
                  }
                  summary.push({ pr: prNumber, author, status: "BLOCKED (Bolt/StackBlitz)" });
                  continue;
                }

                // ------------------------------------------------------------
                //  VÉRIFICATION CODEQL AVEC ATTENTE / CODEQL CHECK WITH POLLING
                // ------------------------------------------------------------
                log.check(`Attente de la fin des checks CodeQL pour SHA ${pr.head.sha}... / Waiting for CodeQL runs to complete for SHA ${pr.head.sha}...`);

                const MAX_WAIT_MS = 10 * 60 * 1000;   // 10 minutes
                const POLL_INTERVAL_MS = 30 * 1000;   // 30 secondes
                const waitStart = Date.now();

                let codeqlRuns = [];

                while (true) {
                  const checksData = await withRetry(() =>
                    ghFetch('GET', `/repos/${owner}/${repo}/commits/${pr.head.sha}/check-runs?per_page=100`)
                  );

                  codeqlRuns = (checksData.check_runs || []).filter(r =>
                    r.name.toLowerCase().includes("codeql")
                  );

                  const pending = codeqlRuns.filter(r => r.status !== "completed");

                  if (pending.length === 0) break;   // tous terminés

                  if (Date.now() - waitStart > MAX_WAIT_MS) {
                    log.warn(`Timeout atteint en attendant CodeQL pour PR #${prNumber}. / Timeout waiting for CodeQL for PR #${prNumber}.`);
                    summary.push({ pr: prNumber, author, status: "TIMEOUT (CodeQL waiting)" });
                    break; // sort de la boucle d'attente
                  }

                  log.info(`En attente de ${pending.length} check(s) CodeQL... / Waiting for ${pending.length} CodeQL check(s)...`);
                  await sleep(POLL_INTERVAL_MS);
                }

                // Si on est sorti par timeout, on passe à la PR suivante
                if (codeqlRuns.some(r => r.status !== "completed")) {
                  continue;
                }

                log.info(`${codeqlRuns.length} check(s) CodeQL terminé(s). / ${codeqlRuns.length} completed CodeQL check(s).`);
                log.verbose(JSON.stringify(codeqlRuns.map(c => ({ name: c.name, status: c.status, conclusion: c.conclusion })), null, 2));

                // Vérification des échecs
                const failingCodeql = codeqlRuns.filter(r =>
                  !["success", "neutral", "skipped"].includes(r.conclusion)
                );

                if (failingCodeql.length) {
                  const names = failingCodeql.map(r => r.name).join(', ');
                  log.warn(`CodeQL échoué : ${names} / CodeQL failing: ${names}`);
                  // Anti-doublon commentaire / Dedup comment
                  const existingComments = await withRetry(() =>
                    ghFetch('GET', `/repos/${owner}/${repo}/issues/${prNumber}/comments?per_page=100`)
                  );
                  if (!existingComments.some(c => c.body && c.body.includes('CodeQL checks failed'))) {
                    const body = `⚠️ Approbation ignorée : CodeQL échoué : ${names}.\n⚠️ Auto-approval skipped: CodeQL checks failed: ${names}.`;
                    await withRetry(() =>
                      ghFetch('POST', `/repos/${owner}/${repo}/issues/${prNumber}/comments`, { body })
                    );
                  }
                  summary.push({ pr: prNumber, author, status: `BLOCKED (CodeQL: ${names})` });
                  continue;
                }

                // ------------------------------------------------------------
                // Idempotence
                //  Evite d'approuver une PR déjà approuvée
                //  Avoids approving an already-approved PR
                // ------------------------------------------------------------
                // En mode dispatch on vérifie s'il existe une approbation quelconque
                // In dispatch mode we check for any existing approval
                const reviewsData = await withRetry(() =>
                  ghFetch('GET', `/repos/${owner}/${repo}/pulls/${prNumber}/reviews?per_page=100`)
                );

                const alreadyApproved = reviewsData.some(r => r.state === "APPROVED");

                if (alreadyApproved) {
                  log.skip(`Déjà approuvée. / Already approved.`);
                  summary.push({ pr: prNumber, author, status: "ALREADY APPROVED" });
                  continue;
                }

                // ------------------------------------------------------------
                //  APPROBATION / APPROVAL
                // ------------------------------------------------------------
                await withRetry(() =>
                  ghFetch('POST', `/repos/${owner}/${repo}/pulls/${prNumber}/reviews`, {
                    event: "APPROVE",
                    body: "✅ Auto-approuvé par workflow (mode manuel). / Auto-approved by workflow (manual mode)."
                  })
                );

                log.approve(`PR #${prNumber} approuvée manuellement. / PR #${prNumber} approved manually.`);
                summary.push({ pr: prNumber, author, status: "APPROVED" });

              } catch (err) {
                // Capture les erreurs par PR sans interrompre la boucle
                // Catches per-PR errors without interrupting the loop
                log.error(`Erreur sur PR #${prNumber} : ${err.message} / Error processing PR #${prNumber}: ${err.message}`);
                summary.push({ pr: prNumber, author, status: `ERROR (${err.message})` });
              }
            }

            // ----------------------------------------------------------------
            //  TABLEAU RÉCAPITULATIF / SUMMARY TABLE
            // ----------------------------------------------------------------
            core.info("\n\x1b[36m========== RÉSUMÉ AUTO-APPROVE / AUTO-APPROVE SUMMARY ==========\x1b[0m");
            summary.forEach(s => {
              core.info(`PR #${s.pr} | Auteur/Author: ${s.author} | Statut/Status: ${s.status}`);
            });
            core.info("\x1b[36m================================================================\x1b[0m");
            
