name: Auto Approve PR (Approved Users Only)

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch: {}

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Auto-approve single PR (event)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const APPROVED_USERS = ['Phoen0x', 'AetherXYZ', 'MinhoZenS'];
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            if (!APPROVED_USERS.includes(author)) {
              core.info(`Author ${author} not in approved list, skipping.`);
              return;
            }

            const { owner, repo } = context.repo;
            const prNumber = pr.number;

            const commits = await github.rest.pulls.listCommits({
              owner, repo, pull_number: prNumber
            });

            let isBoltPush = false;
            for (const commit of commits.data) {
              const committerName = commit.commit.committer?.name || "";
              const committerEmail = commit.commit.committer?.email || "";
              if (
                committerName.includes("bolt") ||
                committerEmail.includes("stackblitz") ||
                committerEmail.includes("bolt") ||
                committerName.includes("Bolt")
              ) {
                isBoltPush = true;
                break;
              }
            }

            if (isBoltPush) {
              core.info('Bolt.new / StackBlitz detected, not auto-approving.');
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: prNumber,
                body: '⚠️ **Auto-approval blocked**: Commits detected from bolt.new (StackBlitz). Manual review required.'
              });
              return;
            }

            await github.rest.pulls.createReview({
              owner, repo,
              pull_number: prNumber,
              event: 'APPROVE'
            });
            core.info(`PR #${prNumber} auto-approved.`);

      - name: Auto-approve all open PRs (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const APPROVED_USERS = ['Phoen0x', 'AetherXYZ', 'MinhoZenS'];
            const { owner, repo } = context.repo;

            const prs = await github.paginate(
              github.rest.pulls.list,
              { owner, repo, state: 'open' }
            );

            for (const pr of prs) {
              const author = pr.user.login;
              const prNumber = pr.number;

              if (!APPROVED_USERS.includes(author)) {
                core.info(`PR #${prNumber}: author ${author} not approved, skipping.`);
                continue;
              }

              const commits = await github.rest.pulls.listCommits({
                owner, repo, pull_number: prNumber
              });

              let isBoltPush = false;
              for (const commit of commits.data) {
                const committerName = commit.commit.committer?.name || "";
                const committerEmail = commit.commit.committer?.email || "";
                if (
                  committerName.includes("bolt") ||
                  committerEmail.includes("stackblitz") ||
                  committerEmail.includes("bolt") ||
                  committerName.includes("Bolt")
                ) {
                  isBoltPush = true;
                  break;
                }
              }

              if (isBoltPush) {
                core.info(`PR #${prNumber}: bolt.new detected, not auto-approving.`);
                await github.rest.issues.createComment({
                  owner, repo,
                  issue_number: prNumber,
                  body: '⚠️ **Auto-approval blocked**: Commits detected from bolt.new (StackBlitz). Manual review required.'
                });
                continue;
              }

              await github.rest.pulls.createReview({
                owner, repo,
                pull_number: prNumber,
                event: 'APPROVE'
              });
              core.info(`PR #${prNumber} auto-approved.`);
            }
