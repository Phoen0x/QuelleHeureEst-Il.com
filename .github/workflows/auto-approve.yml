name: Auto Approve PR (Approved Users Only)

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Check if PR author is approved AND NOT from bolt.new
        id: check_source
        run: |
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          APPROVED_USERS="Phoen0x|AetherXYZ|MinhoZenS"
          
          # Vérifie que c'est un utilisateur approuvé
          if [[ $PR_AUTHOR =~ ^($APPROVED_USERS)$ ]]; then
            echo "author_approved=true" >> $GITHUB_OUTPUT
          else
            echo "author_approved=false" >> $GITHUB_OUTPUT
          fi

      - name: Check commit metadata for bolt.new signs
        id: check_bolt
        if: steps.check_source.outputs.author_approved == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const commits = context.payload.pull_request.commits;
            const { owner, repo } = context.repo;
            const prNumber = context.issue.number;
            
            // Récupère les commits de la PR
            const prCommits = await github.rest.pulls.listCommits({
              owner, repo, pull_number: prNumber
            });
            
            let isBoltPush = false;
            
            for (const commit of prCommits.data) {
              const committerName = commit.commit.committer?.name || "";
              const committerEmail = commit.commit.committer?.email || "";
              
              // Détecte bolt.new via le committer ou l'email
              if (
                committerName.includes("bolt") ||
                committerEmail.includes("stackblitz") ||
                committerEmail.includes("bolt") ||
                committerName.includes("Bolt")
              ) {
                isBoltPush = true;
                break;
              }
            }
            
            core.setOutput("is_bolt_push", isBoltPush);

      - name: Approve PR
        if: steps.check_source.outputs.author_approved == 'true' && steps.check_bolt.outputs.is_bolt_push == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'APPROVE'
            })

      - name: Comment if blocked
        if: steps.check_bolt.outputs.is_bolt_push == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ **Auto-approval blocked**: Commits detected from bolt.new (StackBlitz). Manual review required.'
            })
