#-----------------------------------------------------------------------------#
#              WorkFlow : Auto Approve PR (Approved Users Only)               #
#                                                                             #
#   FR//  Approuve automatiquement les PRs des utilisateurs de la whitelist,  #
#  sous réserve qu'aucun commit bolt.new/StackBlitz ne soit détecté           #
#  et que les checks CodeQL soient en succès.                                 #
#                                                                             #
#  ENG//  Auto-approves PRs from whitelisted users, provided no               #
#  bolt.new/StackBlitz commit is detected and all CodeQL checks pass.         #
#-----------------------------------------------------------------------------#

name: Auto Approve PR (Approved Users Only)

on:
  # FR// Déclenché à chaque ouverture ou mise à jour d'une PR (même depuis un fork)
  # ENG// Triggered on PR open or new commits pushed (works even from forks)
  pull_request_target:
    types: [opened, synchronize]

  # FR// Déclenché manuellement depuis l'onglet Actions (scanne toutes les PRs ouvertes)
  # ENG// Manually triggered from the Actions tab (scans all open PRs)
  workflow_dispatch: {}

jobs:
  auto-approve:
    runs-on: ubuntu-latest

    env:
      # FR// Force l'exécution des actions JavaScript sous Node.js 24
      # ENG// Forces JavaScript actions to run under Node.js 24
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      # FR// PATs chargés en variables d'environnement pour le mode dispatch
      # ENG// PATs loaded as env vars for dispatch mode (cross-review)
      PAT_MINHO:  ${{ secrets.PAT_AUTO_APPROVE_MINHOZENS }}
      PAT_AETHER: ${{ secrets.PAT_AUTO_APPROVE_AETHERXYZ }}

      # FR// Activer les logs VERBOSE via le secret AUTO_APPROVE_VERBOSE="true"
      # ENG// Enable VERBOSE logs via the secret AUTO_APPROVE_VERBOSE="true"
      VERBOSE: ${{ secrets.AUTO_APPROVE_VERBOSE }}

      # FR// Utilisateurs autorisés (séparés par des virgules, insensible à la casse)
      # ENG// Authorized users (comma-separated, case-insensitive)
      APPROVED_USERS: "AetherXYZ,MinhoZenS"

      # FR// Mapping auteur → nom de variable d'environnement contenant le PAT
      # FR// Format JSON : {"auteur_en_minuscules":"NOM_VARIABLE_PAT"}
      # ENG// Author → PAT env var mapping (JSON, lowercase author)
      PAT_MAP: '{"aetherxyz":"PAT_MINHO","minhozens":"PAT_AETHER"}'

    permissions:
      # FR// Nécessaire pour approuver
      # ENG// Required to approve PRs
      pull-requests: write

      # FR// Nécessaire pour commenter
      # ENG// Required to post comments
      issues: write

      # FR// Nécessaire pour lire les checks
      # ENG// Required to read checks
      contents: read

    steps:

      #-----------------------------------------------------------------------#
      #   FR//  ÉTAPE 1 — SÉLECTION DU PAT (insensible à la casse)            #
      #                                                                       #
      #        GitHub interdit à un utilisateur d'approuver sa propre PR.     #
      #        On utilise un PAT croisé : la PR d'un utilisateur whitelisté   #
      #        est approuvée via le PAT d'un autre utilisateur whitelisté.    #
      #                                                                       #
      #  ENG//  STEP 1 — PAT SELECTION (case‑insensitive)                     #
      #                                                                       #
      #        GitHub prevents a user from approving their own PR.            #
      #        We use cross‑review PATs: a whitelisted user's PR is approved  #
      #        using another whitelisted user's PAT.                          #
      #-----------------------------------------------------------------------#
      - name: Sélection du PAT selon l'auteur / Select correct PAT based on PR author
        id: select-pat
        run: |
          AUTHOR=$(echo "${{ github.event.pull_request.user.login }}" | tr '[:upper:]' '[:lower:]')
          echo "Auteur détecté (minuscules) : '$AUTHOR'"

          # FR// Extraire le mapping depuis la variable d'environnement
          # ENG// Extract the mapping from the environment variable
          PAT_MAP_JSON='${{ env.PAT_MAP }}'
          # FR// Extraire le nom de la variable PAT pour cet auteur (jq serait plus simple mais pas installé par défaut)
          #      On utilise grep + cut ou awk (awk est disponible)
          # ENG// Extract the PAT variable name for this author (jq would be easier but not installed by default)
          #       We use grep + cut or awk (awk is available)
          PAT_VAR=$(echo "$PAT_MAP_JSON" | awk -v author="$AUTHOR" '{
            # FR// suppression des accolades et guillemets, découpage
            # ENG// remove braces and quotes, split
            gsub(/[{}"]/, "");
            split($0, pairs, ",");
            for (i in pairs) {
              split(pairs[i], kv, ":");
              if (kv[1] == author) {
                print kv[2];
                exit;
              }
            }
          }')

          if [ -n "$PAT_VAR" ]; then

            # FR//  Récupération dynamique de la valeur de la variable dont le nom est dans PAT_VAR
            # ENG//  Dynamically fetch the value of the variable whose name is in PAT_VAR
            TOKEN="${!PAT_VAR}"
            if [ -z "$TOKEN" ]; then
              echo "⚠️ La variable $PAT_VAR est vide (secret manquant ou non défini ?)" >&2
            else
              echo "✅ Token récupéré via $PAT_VAR (longueur : ${#TOKEN})"
            fi
          else
            echo "Auteur non reconnu, token vide"
            TOKEN=""
          fi

          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      #------------------------------------------------------------#
      #   FR//   ÉTAPE 2 — MODE AUTOMATIQUE (pull_request_target)  #
      #                                                            #
      #           Déclenché à chaque PR ouverte ou mise à jour.    #
      #                                                            #
      #                                                            #
      #  ENG//  STEP 2 — AUTOMATIC MODE (pull_request_target)      #
      #                                                            #
      #           Triggered on every PR opened or updated.         #
      #------------------------------------------------------------#
      - name: Approbation automatique d'une PR / Auto-approve single PR (event)
        if: github.event_name == 'pull_request_target'
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.select-pat.outputs.token }}
          script: |

            //-----------------------//
            //  FR//  CONFIGURATION  //
            // ENG//  CONFIGURATION  //
            //-----------------------//

            //  FR// Récupération des utilisateurs autorisés depuis la variable d'environnement
            // ENG// Fetch authorized users from the environment variable
            const approvedUsersStr = process.env.APPROVED_USERS || '';
            const APPROVED_USERS = approvedUsersStr.split(',').map(u => u.trim()).filter(u => u.length > 0);

            const { owner, repo } = context.repo;
            const pr       = context.payload.pull_request;
            const prNumber = pr.number;
            const author   = pr.user.login;

            //-------------------------------------------------------------------//
            //   FR//  SYSTÈME DE LOGS COLORÉS AVEC TIMESTAMPS                   //
            //        Utilise les codes ANSI pour colorer les logs dans Actions  //
            //        et préfixe chaque message par un timestamp ISO 8601.       //
            //  ENG//  COLORED LOGGING SYSTEM WITH TIMESTAMPS                    //
            //        Uses ANSI color codes to colorize logs in Actions          //
            //        and prefixes each message with an ISO 8601 timestamp.      //
            //-------------------------------------------------------------------//

            const log = {
              _ts: () => new Date().toISOString(),
              info:    msg => core.info(`\x1b[36m[${log._ts()} INFO]\x1b[0m ${msg}`),
              warn:    msg => core.warning(`\x1b[33m[${log._ts()} WARN]\x1b[0m ${msg}`),
              error:   msg => core.error(`\x1b[31m[${log._ts()} ERROR]\x1b[0m ${msg}`),
              check:   msg => core.info(`\x1b[35m[${log._ts()} CHECK]\x1b[0m ${msg}`),
              approve: msg => core.info(`\x1b[32m[${log._ts()} APPROVE]\x1b[0m ${msg}`),
              skip:    msg => core.info(`\x1b[33m[${log._ts()} SKIP]\x1b[0m ${msg}`),
              //  FR//  Logs détaillés activables via le secret VERBOSE="true"
              // ENG//  Detailed logs activatable via the VERBOSE="true" secret
              verbose: msg => process.env.VERBOSE === "true"
                ? core.info(`\x1b[90m[${log._ts()} VERBOSE]\x1b[0m ${msg}`)
                : null
            };

            log.info(`Traitement de la PR #${prNumber} par ${author} / Processing PR #${prNumber} by ${author}`);

            //--------------------------------------------------------------//
            //   FR//  FILTRE AUTEUR                                        //
            //        Seuls les utilisateurs de la whitelist sont traités.  //
            //                                                              //
            //  ENG//  AUTHOR FILTER                                        //
            //        Only whitelisted users are processed.                 //
            //--------------------------------------------------------------//

            if (!APPROVED_USERS.includes(author)) {
              log.skip(`Auteur "${author}" non autorisé, PR ignorée. / Author "${author}" not in whitelist, skipping.`);
              return;
            }

            log.info(`PAT actif — reviewer : ${context.actor} / Active PAT — reviewer: ${context.actor}`);

            //----------------------//
            //   FR//  UTILITAIRES  //
            //  ENG//  UTILITIES    //
            //----------------------//

            function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

            //   FR//  Retry avec backoff exponentiel — évite les échecs transitoires de l'API
            //  ENG//  Retry with exponential backoff — avoids transient API failures
            async function withRetry(fn, attempts = 3, delay = 1000) {
              for (let i = 0; i < attempts; i++) {
                try { return await fn(); }
                catch (e) {
                  if (i === attempts - 1) throw e;
                  log.warn(`Tentative ${i+1} échouée : ${e.message}. Retry dans ${delay}ms / Attempt ${i+1} failed: ${e.message}. Retrying in ${delay}ms`);
                  await sleep(delay);
                  delay *= 2;
                }
              }
            }

            //----------------------------------------------------------------------------//
            //   FR//  ANALYSE DES COMMITS                                                //
            //        Détecte les commits provenant de bolt.new ou StackBlitz             //
            //                                                                            //
            //        per_page: 100 — sans ça, l'API retourne 30 commits max par défaut.  //
            //        Un commit bolt.new au-delà du 30ème passerait inaperçu.             //
            //                                                                            //
            //  ENG//  COMMIT SCAN                                                        //
            //        Detects commits originating from bolt.new or StackBlitz             //
            //                                                                            //
            //        per_page: 100 — without this, the API returns max 30 commits.       //
            //----------------------------------------------------------------------------//

            log.check(`Récupération des commits... / Fetching commits...`);
            const commits = await withRetry(() =>
              github.rest.pulls.listCommits({ owner, repo, pull_number: prNumber, per_page: 100 })
            );

            log.info(`${commits.data.length} commit(s) trouvé(s). / Found ${commits.data.length} commit(s).`);
            log.verbose(JSON.stringify(commits.data.map(c => c.sha), null, 2));

            //   FR//  Détection par nom ou email du committer (insensible à la casse)
            //  ENG//  Detection via committer name or email (case-insensitive)
            const isBolt = commits.data.some(c => {
              const name  = c.commit.committer?.name?.toLowerCase()  || "";
              const email = c.commit.committer?.email?.toLowerCase() || "";
              return name.includes("bolt") || email.includes("bolt") || email.includes("stackblitz");
            });

            if (isBolt) {
              log.warn(`Bolt.new / StackBlitz détecté — approbation bloquée. / Bolt.new / StackBlitz detected — approval blocked.`);
              const msg = '⚠️ **Auto-approval blocked** : commits bolt.new/StackBlitz détectés. Revue manuelle requise.\n⚠️ **Auto-approval blocked**: bolt.new/StackBlitz commits detected. Manual review required.';
              //   FR//  Anti-doublon : ne poste le commentaire que s'il n'existe pas déjà
              //  ENG//  Dedup: only post comment if not already present
              const comments = await withRetry(() =>
                github.rest.issues.listComments({ owner, repo, issue_number: prNumber, per_page: 100 })
              );
              if (!comments.data.some(c => c.body && c.body.includes('Auto-approval blocked'))) {
                await withRetry(() =>
                  github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: msg })
                );
              }
              return;
            }

            //------------------------------------------------------------------//
            //   FR//  VÉRIFICATION CODEQL AVEC COOLDOWN STABLE (head + merge)  //
            //        Récupère les check runs sur le commit de branche et       //
            //        le merge commit (si disponible).                          //
            //        Attends que le nombre de checks CodeQL reste stable       //
            //        pendant 90 secondes et que tous soient terminés.          //
            //                                                                  //
            //  ENG//  CODEQL CHECK WITH STABLE COOLDOWN (head + merge)         //
            //        Fetches check runs for the branch commit and              //
            //        the merge commit (if available).                          //
            //        Waits for the number of CodeQL checks to remain stable    //
            //        for 90 seconds and all to be completed.                   //
            //------------------------------------------------------------------//

            log.check(`Attente de la fin des checks CodeQL... / Waiting for CodeQL runs to complete...`);

            const MAX_WAIT_MS = 15 * 60 * 1000;  // 15 minutes timeout global
            const POLL_INTERVAL_MS = 30 * 1000;  // 30 secondes
            const COOLDOWN_MS = 90 * 1000;       // 1 minute 30 sans changement
            const waitStart = Date.now();

            //   FR//  Définir la liste des SHAs à scruter
            //  ENG//  Define the list of SHAs to watch
            const shaList = [pr.head.sha];
            if (pr.merge_commit_sha && pr.merge_commit_sha !== pr.head.sha) {
              shaList.push(pr.merge_commit_sha);
            }
            log.verbose(`SHA scrutés : ${shaList.join(', ')}`);

            let codeqlRuns = [];
            let cooldownStart = null;      // timestamp de début du cooldown, ou null
            let lastCheckCount = 0;        // nombre de checks lors du dernier démarrage du cooldown

            while (true) {
              //   FR//  1. Récupérer les check runs pour chaque SHA et les fusionner
              //  ENG//  1. Fetch the latest check suite for each SHA and fuse them
              const allRuns = [];
              for (const sha of shaList) {
                const checks = await withRetry(() =>
                  github.rest.checks.listForRef({ owner, repo, ref: sha, per_page: 100 })
                );
                allRuns.push(...(checks.data.check_runs || []));
              }
              //   FR//  Déduplication par ID de check
              //  ENG//  Deduplication by check ID
              const uniqueMap = new Map();
              for (const run of allRuns) {
                uniqueMap.set(run.id, run);
              }
              const uniqueRuns = Array.from(uniqueMap.values());

              codeqlRuns = uniqueRuns.filter(r =>
                r.name.toLowerCase().includes("codeql")
              );

              const currentCount = codeqlRuns.length;
              const pending = codeqlRuns.filter(r => r.status !== "completed");

              //   FR//  Si au moins un check et tous sont terminés
              //  ENG//  If at least one check and all are completed
              if (currentCount > 0 && pending.length === 0) {
                if (cooldownStart === null || currentCount !== lastCheckCount) {
                
                  //   FR//  Démarre ou redémarre le cooldown car le nombre de checks a changé
                  //  ENG//  Start or restart the cooldown because the check count changed
                  cooldownStart = Date.now();
                  lastCheckCount = currentCount;
                  log.info(`Tous les checks CodeQL sont terminés (${currentCount}). Démarrage/redémarrage du cooldown de 90 secondes.`);
                } else if (Date.now() - cooldownStart >= COOLDOWN_MS) {
                
                  //   FR//  Cooldown terminé sans changement du nombre de checks
                  //  ENG//  Cooldown finished without any change in check count
                  log.info(`Cooldown terminé. Aucun nouveau check détecté.`);
                  break;
                }
              } else {
              
                //   FR//  Soit aucun check, soit certains sont en cours → réinitialise le cooldown
                //  ENG//  Either no checks or some are still in progress → reset cooldown
                if (cooldownStart !== null) {
                  log.info(`Changement détecté (checks: ${currentCount}, en cours: ${pending.length}). Réinitialisation du cooldown.`);
                  cooldownStart = null;
                }
              }

              if (Date.now() - waitStart > MAX_WAIT_MS) {
                log.warn(`Timeout global atteint en attendant CodeQL. Aucune approbation.`);
                return;
              }

              log.info(`En attente des checks CodeQL (trouvés: ${currentCount}, en cours: ${pending.length}, cooldown: ${cooldownStart ? Math.round((Date.now() - cooldownStart)/1000) + 's' : 'non'})...`);
              await sleep(POLL_INTERVAL_MS);
            }

            log.info(`${codeqlRuns.length} check(s) CodeQL terminé(s) après cooldown stable. / Detected ${codeqlRuns.length} completed CodeQL check(s) after stable cooldown.`);
            log.verbose(JSON.stringify(codeqlRuns.map(c => ({ name: c.name, status: c.status, conclusion: c.conclusion })), null, 2));

            //   FR//  Vérification qu'aucun check n'est en échec
            //  ENG//  Verification that no check has failed
            const failingCodeql = codeqlRuns.filter(r =>
              !["success", "neutral", "skipped"].includes(r.conclusion)
            );

            if (failingCodeql.length) {
              const names = failingCodeql.map(r => r.name).join(', ');
              log.warn(`CodeQL échoué : ${names} / CodeQL failing: ${names}`);
              const msg = `⚠️ Approbation automatique ignorée : les checks CodeQL ont échoué : ${names}.\n⚠️ Auto-approval skipped: CodeQL checks failed: ${names}.`;
              //   FR//  Anti-doublon commentaire
              //  ENG//  Dedup comment
              const comments = await withRetry(() =>
                github.rest.issues.listComments({ owner, repo, issue_number: prNumber, per_page: 100 })
              );
              if (!comments.data.some(c => c.body && c.body.includes('CodeQL checks failed'))) {
                await withRetry(() =>
                  github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: msg })
                );
              }
              return;
            }

            //---------------------------------------------------------------//
            //   FR//  Idempotence                                           //
            //        Vérifie si la PR est déjà approuvée par ce reviewer    //
            //        afin d'éviter des approbations en double.              //
            //                                                               //
            //  ENG//  Idempotence                                           //
            //        Checks if the PR is already approved by this reviewer  //
            //        to avoid duplicate approvals.                          //
            //---------------------------------------------------------------//
            log.check(`Vérification des reviews existantes... / Checking existing reviews...`);
            const reviews = await withRetry(() =>
              github.rest.pulls.listReviews({ owner, repo, pull_number: prNumber, per_page: 100 })
            );

            const alreadyApproved = reviews.data.some(r =>
              r.user?.login === context.actor && r.state === "APPROVED"
            );

            if (alreadyApproved) {
              log.skip(`Déjà approuvée par ${context.actor}. / Already approved by ${context.actor}.`);
              return;
            }

            //----------------------//
            //   FR//  APPROBATION  //
            //  ENG//  APPROVAL     //
            //----------------------//
            log.approve(`Approbation de la PR #${prNumber}... / Approving PR #${prNumber}...`);
            await withRetry(() =>
              github.rest.pulls.createReview({
                owner, repo,
                pull_number: prNumber,
                event: "APPROVE",
                body: "✅ Auto-approuvé par le workflow. / Auto-approved by workflow."
              })
            );

            log.approve(`PR #${prNumber} approuvée avec succès. / PR #${prNumber} approved successfully.`);

            //------------------//
            //   FR//  RÉSUMÉ   //
            //  ENG//  SUMMARY  //
            //------------------//
            core.info([
              '',
              '\x1b[32m==================== RÉSUMÉ / SUMMARY ====================\x1b[0m',
              `PR :                 #${prNumber}`,
              `Auteur / Author :    ${author}`,
              `Reviewer :           ${context.actor}`,
              'CodeQL :             \u2705 OK',
              'Bolt/StackBlitz :    \u2705 Non détecté / Not detected',
              'Statut / Status :    \u2705 APPROVED',
              '\x1b[32m==========================================================\x1b[0m',
              ''
            ].join('\n'));

      #----------------------------------------------------------------------------#
      #   FR//          ÉTAPE 3 — Mode Manuel (workflow_dispatch)                  #
      #                                                                            #
      #         Scanne TOUTES les PRs ouvertes (y compris les anciennes) et les    #
      #         approuve si elles passent tous les filtres.                        #
      #         Pour le cross-review, on instancie un client Octokit dédié avec    #
      #         le bon PAT pour chaque PR — contrairement à github.auth = token    #
      #         qui ne fonctionne pas dans github-script.                          #
      #                                                                            #
      #  ENG//          STEP 3 — Manual Mode (workflow_dispatch)                   #
      #                                                                            #
      #         Scans ALL open PRs (including older ones) and approves them if     #
      #         they pass all filters.                                             #
      #         For cross-review, a dedicated Octokit client is instantiated with  #
      #         the correct PAT per PR — unlike github.auth = token which does     #
      #         not work inside github-script.                                     #
      #----------------------------------------------------------------------------#

      - name: Approbation manuelle de toutes les PRs ouvertes / Auto-approve all open PRs (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v8
        with:
          #   FR//  Token de base pour lister les PRs (lecture seule)
          #  ENG//  Base token to list PRs (read-only)
          github-token: ${{ secrets.PAT_AUTO_APPROVE_MINHOZENS }}
          script: |

            //------------------------//
            //   FR//  CONFIGURATION  //
            //  ENG//  CONFIGURATION  //
            //------------------------//

            //   FR//  Récupération des utilisateurs autorisés depuis la variable d'environnement
            //  ENG//  Fetch authorized users from the environment variable
            const approvedUsersStr = process.env.APPROVED_USERS || '';
            const APPROVED_USERS = approvedUsersStr.split(',').map(u => u.trim()).filter(u => u.length > 0);

            const { owner, repo } = context.repo;

            //--------------------------------------------------//
            //   FR//  SYSTÈME DE LOGS COLORÉS AVEC TIMESTAMPS  //
            //  ENG//  COLORED LOGGING SYSTEM WITH TIMESTAMPS   //
            //--------------------------------------------------//
            const log = {
              _ts: () => new Date().toISOString(),
              info:    msg => core.info(`\x1b[36m[${log._ts()} INFO]\x1b[0m ${msg}`),
              warn:    msg => core.warning(`\x1b[33m[${log._ts()} WARN]\x1b[0m ${msg}`),
              error:   msg => core.error(`\x1b[31m[${log._ts()} ERROR]\x1b[0m ${msg}`),
              check:   msg => core.info(`\x1b[35m[${log._ts()} CHECK]\x1b[0m ${msg}`),
              approve: msg => core.info(`\x1b[32m[${log._ts()} APPROVE]\x1b[0m ${msg}`),
              skip:    msg => core.info(`\x1b[33m[${log._ts()} SKIP]\x1b[0m ${msg}`),
              //   FR//  Logs détaillés activables via le secret VERBOSE="true"
              //  ENG//  Detailed logs activatable via the VERBOSE="true" secret
              verbose: msg => process.env.VERBOSE === "true"
                ? core.info(`\x1b[90m[${log._ts()} VERBOSE]\x1b[0m ${msg}`)
                : null
            };

            //----------------------//
            //   FR//  UTILITAIRES  //
            //  ENG//  UTILITIES    //
            //----------------------//

            function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

            //   FR//  Retry avec backoff exponentiel
            //  ENG//  Retry with exponential backoff
            async function withRetry(fn, attempts = 3, delay = 1000) {
              for (let i = 0; i < attempts; i++) {
                try { return await fn(); }
                catch (e) {
                  if (i === attempts - 1) throw e;
                  log.warn(`Tentative ${i+1} échouée : ${e.message}. Retry dans ${delay}ms / Attempt ${i+1} failed: ${e.message}. Retrying in ${delay}ms`);
                  await sleep(delay);
                  delay *= 2;
                }
              }
            }

            log.info(`Mode manuel : scan de toutes les PRs ouvertes... / Manual mode: scanning all open PRs...`);

            //---------------------------------------------------------------------//
            //   FR//  RÉCUPÉRATION DE TOUTES LES PRs OUVERTES                     //
            //        github.paginate parcourt automatiquement toutes les pages,   //
            //        ce qui inclut les PRs anciennes.                             //
            //                                                                     //
            //  ENG//  FETCH ALL OPEN PRs                                          //
            //        github.paginate automatically walks through all pages,       //
            //        which includes older PRs.                                    //
            //---------------------------------------------------------------------//
            const prs = await withRetry(() =>
              github.paginate(github.rest.pulls.list, { owner, repo, state: 'open', per_page: 100 })
            );

            log.info(`${prs.length} PR(s) ouverte(s) trouvée(s). / Found ${prs.length} open PR(s).`);

            //   FR//  Tableau récapitulatif rempli au fil du traitement
            //  ENG//  Summary table filled as PRs are processed
            const summary = [];

            for (const pr of prs) {
              const prNumber = pr.number;
              const author   = pr.user.login;

              log.info(`\n--- PR #${prNumber} par/by ${author} ---`);

              //---------------------------//
              //   FR//  FILTRE WHITELIST  //
              //  ENG//  WHITELIST FILTER  //
              //---------------------------//
              if (!APPROVED_USERS.includes(author)) {
                log.skip(`Auteur "${author}" non autorisé. / Author "${author}" not whitelisted.`);
                summary.push({ pr: prNumber, author, status: "SKIPPED (not whitelisted)" });
                continue;
              }

              //----------------------------------------------------------------------//
              //   FR//      SÉLECTION DU PAT CROSS-REVIEW                            //
              //                                                                      //
              //     On ne peut pas utiliser github.auth = token dans github-script   //
              //     (le client est initialisé une seule fois à l'entrée du script).  //
              //     On instancie donc un client Octokit dédié avec le bon PAT.       //
              //                                                                      //
              //  ENG//      CROSS-REVIEW PAT SELECTION                               //
              //                                                                      //
              //     github.auth = token does not work inside github-script           //
              //     (the client is initialized once at script entry).                //
              //     We therefore instantiate a dedicated Octokit client with         //
              //     the correct PAT for each PR.                                     //
              //----------------------------------------------------------------------//

              const authorLower = author.toLowerCase();

              //   FR//  Récupération du mapping PAT depuis la variable d'environnement
              //  ENG//  Fetch PAT mapping from the environment variable
              let patMap = {};
              try {
                patMap = JSON.parse(process.env.PAT_MAP || '{}');
              } catch (e) {
                log.error(`Erreur de parsing du PAT_MAP : ${e.message}`);
              }
              const patVarName = patMap[authorLower];
              const token = patVarName ? process.env[patVarName] : null;

              if (!token) {
                log.warn(`Aucun PAT disponible pour PR #${prNumber} (auteur: ${author}). / No PAT available for PR #${prNumber} (author: ${author}), skipping.`);
                summary.push({ pr: prNumber, author, status: "SKIPPED (no PAT)" });
                continue;
              }

              //--------------------------------------------------------------------------//
              //   FR//             CLIENT FETCH LÉGER AVEC LE BON PAT                    //
              //                                                                          //
              //     require('@actions/github') n'est pas accessible dans github-script.  //
              //     On utilise fetch (toujours disponible) pour appeler l'API GitHub     //
              //     directement avec le token cross-review approprié.                    //
              //                                                                          //
              //  ENG//      LIGHTWEIGHT FETCH CLIENT WITH THE CORRECT PAT                //
              //                                                                          //
              //     require('@actions/github') is not accessible inside github-script.   //
              //     We use fetch (always available) to call the GitHub API directly      //
              //     with the appropriate cross-review token.                             //
              //--------------------------------------------------------------------------//

              async function ghFetch(method, path, body = null) {
                const opts = {
                  method,
                  headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github+json',
                    'X-GitHub-Api-Version': '2022-11-28',
                    'Content-Type': 'application/json'
                  }
                };
                if (body) opts.body = JSON.stringify(body);
                const res = await fetch(`https://api.github.com${path}`, opts);
                if (!res.ok) throw new Error(`GitHub API ${res.status} on ${method} ${path}: ${await res.text()}`);
                return res.json();
              }

              try {

                //--------------------------------------------------------------------//
                //   FR//              ANALYSE DES COMMITS                            //
                //        per_page: 100 pour couvrir les grosses PRs sans pagination  //
                //                                                                    //
                //  ENG//                 COMMIT SCAN                                 //
                //        per_page: 100 to cover large PRs without additional paging  //
                //--------------------------------------------------------------------//
                log.check(`Récupération des commits... / Fetching commits...`);
                const commitsData = await withRetry(() =>
                  ghFetch('GET', `/repos/${owner}/${repo}/pulls/${prNumber}/commits?per_page=100`)
                );

                log.info(`${commitsData.length} commit(s).`);
                log.verbose(JSON.stringify(commitsData.map(c => c.sha), null, 2));

                //   FR//  Détection bolt.new / StackBlitz (insensible à la casse)
                //  ENG//  Bolt.new / StackBlitz detection (case-insensitive)
                const isBolt = commitsData.some(c => {
                  const name  = c.commit.committer?.name?.toLowerCase()  || "";
                  const email = c.commit.committer?.email?.toLowerCase() || "";
                  return name.includes("bolt") || email.includes("bolt") || email.includes("stackblitz");
                });

                if (isBolt) {
                  log.warn(`Bolt.new / StackBlitz détecté. / Bolt.new / StackBlitz detected.`);
                  //   FR//  Anti-doublon : vérifie avant de poster le commentaire
                  //  ENG//  Dedup: check before posting the comment
                  const existingComments = await withRetry(() =>
                    ghFetch('GET', `/repos/${owner}/${repo}/issues/${prNumber}/comments?per_page=100`)
                  );
                  if (!existingComments.some(c => c.body && c.body.includes('Auto-approval blocked'))) {
                    const msg = '⚠️ **Auto-approval blocked** : commits bolt.new/StackBlitz détectés. Revue manuelle requise.\n⚠️ **Auto-approval blocked**: bolt.new/StackBlitz commits detected. Manual review required.';
                    await withRetry(() =>
                      ghFetch('POST', `/repos/${owner}/${repo}/issues/${prNumber}/comments`, { body: msg })
                    );
                  }
                  summary.push({ pr: prNumber, author, status: "BLOCKED (Bolt/StackBlitz)" });
                  continue;
                }

                //-------------------------------------------------------------//
                //   FR//  VÉRIFICATION CODEQL AVEC ATTENTE (head + merge)     //
                //  ENG//  CODEQL CHECK WITH WAIT (head + merge)               //
                //-------------------------------------------------------------//

                log.check(`Attente de la fin des checks CodeQL pour PR #${prNumber}... / Waiting for CodeQL runs to complete for PR #${prNumber}...`);

                const shaList = [pr.head.sha];
                if (pr.merge_commit_sha && pr.merge_commit_sha !== pr.head.sha) {
                  shaList.push(pr.merge_commit_sha);
                }

                const MAX_WAIT_MS = 10 * 60 * 1000;
                const POLL_INTERVAL_MS = 30 * 1000;
                const waitStart = Date.now();

                let codeqlRuns = [];

                while (true) {
                  const allRuns = [];
                  for (const sha of shaList) {
                    const checksData = await withRetry(() =>
                      ghFetch('GET', `/repos/${owner}/${repo}/commits/${sha}/check-runs?per_page=100`)
                    );
                    allRuns.push(...(checksData.check_runs || []));
                  }
                  const uniqueMap = new Map();
                  for (const run of allRuns) {
                    uniqueMap.set(run.id, run);
                  }
                  const uniqueRuns = Array.from(uniqueMap.values());

                  codeqlRuns = uniqueRuns.filter(r =>
                    r.name.toLowerCase().includes("codeql")
                  );

                  const pending = codeqlRuns.filter(r => r.status !== "completed");

                  if (pending.length === 0) break;   // tous terminés

                  if (Date.now() - waitStart > MAX_WAIT_MS) {
                    log.warn(`Timeout atteint en attendant CodeQL pour PR #${prNumber}.`);
                    summary.push({ pr: prNumber, author, status: "TIMEOUT (CodeQL waiting)" });
                    break;
                  }

                  log.info(`En attente de ${pending.length} check(s) CodeQL... / Waiting for ${pending.length} CodeQL check(s)...`);
                  await sleep(POLL_INTERVAL_MS);
                }

                //   FR//  Si on est sorti par timeout, on passe à la PR suivante
                //  ENG//  If we exited because of timeout, skip to the next PR
                if (codeqlRuns.some(r => r.status !== "completed")) {
                  continue;
                }

                log.info(`${codeqlRuns.length} check(s) CodeQL terminé(s). / ${codeqlRuns.length} completed CodeQL check(s).`);
                log.verbose(JSON.stringify(codeqlRuns.map(c => ({ name: c.name, status: c.status, conclusion: c.conclusion })), null, 2));

                //   FR//  Vérification des échecs
                //  ENG//  Failure verification
                const failingCodeql = codeqlRuns.filter(r =>
                  !["success", "neutral", "skipped"].includes(r.conclusion)
                );

                if (failingCodeql.length) {
                  const names = failingCodeql.map(r => r.name).join(', ');
                  log.warn(`CodeQL échoué : ${names} / CodeQL failing: ${names}`);

                  //   FR//  Anti-doublon commentaire
                  //  ENG//  Dedup comment
                  const existingComments = await withRetry(() =>
                    ghFetch('GET', `/repos/${owner}/${repo}/issues/${prNumber}/comments?per_page=100`)
                  );
                  if (!existingComments.some(c => c.body && c.body.includes('CodeQL checks failed'))) {
                    const body = `⚠️ Approbation ignorée : CodeQL échoué : ${names}.\n⚠️ Auto-approval skipped: CodeQL checks failed: ${names}.`;
                    await withRetry(() =>
                      ghFetch('POST', `/repos/${owner}/${repo}/issues/${prNumber}/comments`, { body })
                    );
                  }
                  summary.push({ pr: prNumber, author, status: `BLOCKED (CodeQL: ${names})` });
                  continue;
                }

                //-------------------------------------------------//
                //   FR//  Idempotence                             //
                //        Evite d'approuver une PR déjà approuvée  //
                //  ENG//  Idempotence                             //
                //        Avoids approving an already-approved PR  //
                //-------------------------------------------------//

                //   FR//  En mode dispatch on vérifie s'il existe une approbation quelconque
                //  ENG//  In dispatch mode we check for any existing approval
                const reviewsData = await withRetry(() =>
                  ghFetch('GET', `/repos/${owner}/${repo}/pulls/${prNumber}/reviews?per_page=100`)
                );

                const alreadyApproved = reviewsData.some(r => r.state === "APPROVED");

                if (alreadyApproved) {
                  log.skip(`Déjà approuvée. / Already approved.`);
                  summary.push({ pr: prNumber, author, status: "ALREADY APPROVED" });
                  continue;
                }

                //----------------------//
                //   FR//  APPROBATION  //
                //  ENG//  APPROVAL     //
                //----------------------//
                await withRetry(() =>
                  ghFetch('POST', `/repos/${owner}/${repo}/pulls/${prNumber}/reviews`, {
                    event: "APPROVE",
                    body: "✅ Auto-approuvé par workflow (mode manuel). / Auto-approved by workflow (manual mode)."
                  })
                );

                log.approve(`PR #${prNumber} approuvée manuellement. / PR #${prNumber} approved manually.`);
                summary.push({ pr: prNumber, author, status: "APPROVED" });

              } catch (err) {
                //   FR//  Capture les erreurs par PR sans interrompre la boucle
                //  ENG//  Catches per-PR errors without interrupting the loop
                log.error(`Erreur sur PR #${prNumber} : ${err.message} / Error processing PR #${prNumber}: ${err.message}`);
                summary.push({ pr: prNumber, author, status: `ERROR (${err.message})` });
              }
            }

            //--------------------------------//
            //   FR//  TABLEAU RÉCAPITULATIF  //
            //  ENG//  SUMMARY TABLE          //
            //--------------------------------//
            core.info("\n\x1b[36m========== RÉSUMÉ AUTO-APPROVE / AUTO-APPROVE SUMMARY ==========\x1b[0m");
            summary.forEach(s => {
              core.info(`PR #${s.pr} | Auteur/Author: ${s.author} | Statut/Status: ${s.status}`);
            });
            core.info("\x1b[36m================================================================\x1b[0m");
