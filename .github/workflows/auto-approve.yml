name: Auto Approve PR (Approved Users Only)

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch: {}

jobs:
  auto-approve:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Select correct PAT based on PR author
        id: select-pat
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"

          if [ "$AUTHOR" = "AetherXYZ" ]; then
            echo "token=${{ secrets.PAT_AUTO_APPROVE_MinhoZenS }}" >> $GITHUB_OUTPUT
          elif [ "$AUTHOR" = "MinhoZenS" ]; then
            echo "token=${{ secrets.PAT_AUTO_APPROVE_AetherXYZ }}" >> $GITHUB_OUTPUT
          else
            echo "token=" >> $GITHUB_OUTPUT
          fi

      - name: Auto-approve single PR (event)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.select-pat.outputs.token }}
          script: |
            const APPROVED_USERS = ['AetherXYZ', 'MinhoZenS'];
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const author = pr.user.login;

            if (!APPROVED_USERS.includes(author)) {
              core.info(`Author ${author} not approved, skipping.`);
              return;
            }

            if (!process.env.GITHUB_TOKEN) {
              core.info(`No PAT available for author ${author}, skipping.`);
              return;
            }

            function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
            async function withRetry(fn, attempts = 3, delay = 1000) {
              for (let i = 0; i < attempts; i++) {
                try { return await fn(); }
                catch (e) {
                  if (i === attempts - 1) throw e;
                  await sleep(delay);
                  delay *= 2;
                }
              }
            }

            // Detect bolt.new / StackBlitz commits
            const commits = await withRetry(() =>
              github.rest.pulls.listCommits({ owner, repo, pull_number: prNumber })
            );

            let isBolt = commits.data.some(c => {
              const name = c.commit.committer?.name?.toLowerCase() || "";
              const email = c.commit.committer?.email?.toLowerCase() || "";
              return name.includes("bolt") || email.includes("bolt") || email.includes("stackblitz");
            });

            if (isBolt) {
              const msg = '⚠️ Auto-approval blocked: bolt.new/StackBlitz commits detected.';
              const comments = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber });
              if (!comments.data.some(c => c.body.includes('Auto-approval blocked'))) {
                await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: msg });
              }
              return;
            }

            // Only check CodeQL
            const sha = pr.head.sha;
            const checks = await withRetry(() =>
              github.rest.checks.listForRef({ owner, repo, ref: sha })
            );

            const codeql = (checks.data.check_runs || []).filter(r =>
              r.name.toLowerCase().includes("codeql")
            );

            const failing = codeql.filter(r =>
              r.status === "completed" && r.conclusion !== "success"
            );

            if (failing.length) {
              const names = failing.map(r => r.name).join(', ');
              const msg = `⚠️ Auto-approval skipped: CodeQL checks failed: ${names}.`;
              const comments = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber });
              if (!comments.data.some(c => c.body.includes('CodeQL checks failed'))) {
                await github.rest.issues.createComment({ owner, repo, issue_number: prNumber, body: msg });
              }
              return;
            }

            // Idempotence
            const reviews = await github.rest.pulls.listReviews({ owner, repo, pull_number: prNumber });
            const already = reviews.data.some(r =>
              r.user?.login === context.actor && r.state === "APPROVED"
            );

            if (already) {
              core.info(`Already approved, skipping.`);
              return;
            }

            // Approve PR
            await github.rest.pulls.createReview({
              owner, repo,
              pull_number: prNumber,
              event: "APPROVE",
              body: "Auto-approved by workflow."
            });

            core.info(`PR #${prNumber} approved.`);

      - name: Auto-approve all open PRs (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_MINHO }}
          script: |
            core.info("Manual mode not updated for dual-PAT logic. Use PR mode for auto-approval.");
